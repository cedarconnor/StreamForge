<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StreamForge Operator Console</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="console">
    <aside class="rail">
      <h1>StreamForge</h1>
      <label>Input Type
        <select id="sourceType">
          <option value="webcam">Webcam</option>
          <option value="ndi">NDI</option>
          <option value="spout">Spout</option>
          <option value="file">File</option>
        </select>
      </label>
      <label>Source
        <input id="sourceName" value="0">
      </label>
      <label>Aspect Policy
        <select id="inRes">
          <option value="auto">Auto preserve</option>
          <option value="native">Native</option>
          <option value="384x288">4:3 384x288</option>
          <option value="512x288">16:9 512x288 crop</option>
        </select>
      </label>
      <label>Prompt
        <textarea id="prompt">vivid oil painting, thick impasto brushstrokes</textarea>
      </label>
      <label>Preset
        <select id="preset">
          <option>PRESERVE</option>
          <option>SUBTLE</option>
          <option selected>BALANCED</option>
          <option>FOLLOW</option>
          <option>FORCE</option>
        </select>
      </label>
      <div class="buttons">
        <button id="validate">Validate</button>
        <button id="start">Start</button>
        <button id="stop">Stop</button>
      </div>
      <fieldset id="live" class="live" disabled>
        <legend>Live Control</legend>
        <label>Ref strength <span id="refVal">0.55</span>
          <input id="refStrength" type="range" min="0" max="1" step="0.01" value="0.55">
        </label>
        <small id="denoiseVal" class="hint">denoise 0.59</small>
        <label>Text magnitude <span id="tmVal">0.60</span>
          <input id="textMag" type="range" min="0" max="1.5" step="0.01" value="0.60">
        </label>
        <label>Steps <span id="stepsVal">4</span>
          <input id="steps" type="range" min="1" max="8" step="1" value="4">
        </label>
        <label>Seed
          <span class="seed-row">
            <input id="seed" type="number" value="7">
            <button id="reroll" type="button">Reroll</button>
          </span>
        </label>
        <label>Live prompt
          <textarea id="livePrompt">vivid oil painting, thick impasto brushstrokes</textarea>
          <button id="applyPrompt" type="button">Apply prompt</button>
        </label>
        <label>Mode
          <select id="liveMode">
            <option value="img2img">img2img</option>
            <option value="edit">edit</option>
          </select>
        </label>
      </fieldset>
    </aside>
    <section class="previews">
      <div class="preview-card">
        <header><span>Input</span><b id="inputMeta">not validated</b></header>
        <div class="preview-box" id="inputBox"><img id="inputPreview" alt="Input preview"></div>
      </div>
      <div class="preview-card">
        <header><span>Output</span><b id="outputMeta">idle</b></header>
        <div class="preview-box" id="outputBox"><img id="outputPreview" alt="Output preview"></div>
      </div>
    </section>
    <aside class="health">
      <h2>Run Health</h2>
      <dl>
        <dt>State</dt><dd id="state">idle</dd>
        <dt>Emitted</dt><dd id="emitted">0</dd>
        <dt>Repeats</dt><dd id="repeats">0</dd>
        <dt>Filled</dt><dd id="filled">0</dd>
        <dt>Jitter</dt><dd id="jitter">0.0 ms</dd>
        <dt>Inference</dt><dd id="infer">none</dd>
      </dl>
      <pre id="messages"></pre>
    </aside>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
